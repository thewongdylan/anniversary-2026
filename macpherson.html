<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CC10 MacPherson</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="assets/shared.css" rel="stylesheet">
    <style>
        /* Small animations to mimic the original game */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.1s ease-in-out; }
        
        @keyframes flip {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(-90deg); }
            100% { transform: rotateX(0); }
        }
        .animate-flip { animation: flip 0.5s ease-in; }

        /* Toast fade */
        .toast-enter { opacity: 0; transform: translateY(-20px); transition: all 0.3s; }
        .toast-enter-active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="overflow-hidden bg-white text-black font-sans antialiased">
    <div id="toast" class="fixed inset-x-4 bottom-4 z-[100] max-w-[22rem] mx-auto bg-[#063e4d] text-slate-100 border border-orange-500/30 rounded-2xl shadow-2xl shadow-slate-950/30 px-4 py-3 flex items-start gap-3 scale-95 opacity-0 pointer-events-none transition-all duration-300">
        <div class="mt-0.5 text-orange-400 flex-shrink-0">
            <i class="fa-solid fa-circle-info"></i>
        </div>
        <div class="min-w-0 flex-1">
            <div class="toast-msg text-[11px] leading-relaxed text-slate-100"></div>
            <button id="toast-action" type="button" class="hidden mt-3 px-3 py-1.5 rounded-lg bg-orange-500 hover:bg-orange-400 text-slate-950 text-[11px] font-bold transition-colors duration-200"></button>
        </div>
    </div>

    <!-- Main Mobile Container -->
    <div class="app-shell max-w-md mx-auto bg-white flex flex-col justify-between shadow-2xl border-x border-slate-200/60 relative overflow-hidden">
        
        <!-- Header -->
        <header class="bg-[#063e4d] border-b border-slate-200/20 p-4 sticky top-0 z-50 flex items-center justify-between">
            <button onclick="goBack()" class="text-sm font-semibold text-slate-400 hover:text-white transition-all flex items-center gap-1">
                <i class="fa-solid fa-chevron-left"></i> Map
            </button>
            <div class="flex items-center space-x-1.5">
                <span class="font-lta bg-[#FA890F] text-white text-[10px] px-1.5 py-0.5 rounded font-black tracking-wide">CC10</span>
                <span class="font-lta bg-[#005ec4] text-white text-[10px] px-1.5 py-0.5 rounded font-black tracking-wide">DT26</span>
                <span class="font-lta text-xs font-bold text-slate-200">MacPherson</span>
            </div>
            <div class="w-10"></div> <!-- spacer -->
        </header>

        <!-- Wordle -->
        <div id='wordle' class="hidden app-shell max-w-md mx-auto bg-white flex flex-col shadow-2xl border-x border-slate-200/60 relative overflow-hidden">

            <!-- Header -->
            <header class="flex items-center justify-center p-4 border-b border-gray-300">
            <h1 class="font-karnak text-3xl font-bold tracking-wider">Wordle</h1>
            </header>

            <!-- Toast Notification Container -->
            <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2"></div>

            <!-- Game Board -->
            <main class="flex-grow flex items-center justify-center mt-6">
                <div id="board" class="grid grid-rows-6 gap-1.5 w-fit">
                    <!-- Grid is generated by JS -->
                </div>
            </main>

            <!-- On-screen Keyboard -->
            <div id="keyboard" class="w-full max-w-lg mx-auto mb-2 flex flex-col gap-2 px-2 pb-8">
                <!-- Keyboard is generated by JS -->
            </div>

        </div>

        <!-- Bottom Action Bar -->
        <footer class="bg-white border-t border-slate-200/60 p-5 flex flex-col space-y-3">
            <button id="unlock-btn" disabled onclick="unlockNext()" class="w-full py-3.5 px-4 rounded-xl font-bold text-xs bg-slate-800 border border-slate-700 text-slate-500 cursor-not-allowed transition-all flex items-center justify-center gap-2 shadow-lg shadow-orange-950/10">
                <i class="fa-solid fa-lock text-[10px]"></i> Solve to unlock next station
            </button>
        </footer>

    </div>

    <script>
        // Utility functions
        function goBack() {
            window.location.href = 'index.html';
        }

        function enableUnlockBtn() {
            // Enable unlock button
            const unlockBtn = document.getElementById('unlock-btn');
            unlockBtn.removeAttribute('disabled');
            unlockBtn.className = 'w-full py-3.5 px-4 rounded-xl font-extrabold text-xs bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-slate-950 transition-all flex items-center justify-center gap-2 shadow-lg shadow-orange-500/20 active:scale-[0.98] cursor-pointer';
            unlockBtn.innerHTML = '<i class="fa-solid fa-train"></i> Continue on your journey!';
        }

        function unlockNext() {
            const currentProgress = parseInt(localStorage.getItem('mrt_progress') || '1');
            if (currentProgress === 1) {
                localStorage.setItem('mrt_progress', '2');
            }
            goBack();
        }

        function hideToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('top-1/2', '-translate-y-1/2');
            toast.classList.add('bottom-4');
            toast.classList.remove('scale-100', 'opacity-100', 'pointer-events-auto');
            toast.classList.add('scale-95', 'opacity-0', 'pointer-events-none');
        }

        function formatToastMessage(message) {
            const template = document.createElement('template');
            template.innerHTML = message;

            const allowedTags = new Set(['B', 'STRONG', 'I', 'EM', 'BR']);

            function sanitizeNode(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return document.createTextNode(node.textContent);
                }

                if (node.nodeType !== Node.ELEMENT_NODE || !allowedTags.has(node.tagName)) {
                    const fragment = document.createDocumentFragment();
                    node.childNodes.forEach((child) => {
                        fragment.appendChild(sanitizeNode(child));
                    });
                    return fragment;
                }

                const element = document.createElement(node.tagName.toLowerCase());
                node.childNodes.forEach((child) => {
                    element.appendChild(sanitizeNode(child));
                });
                return element;
            }

            const fragment = document.createDocumentFragment();
            template.content.childNodes.forEach((node) => {
                fragment.appendChild(sanitizeNode(node));
            });

            return fragment;
        }

        function showToast(message, options = {}) {
            const { actionLabel = null, onAction = null, autoHide = true, duration = 2500, centered = false } = options;
            const toast = document.getElementById('toast');
            const actionButton = document.getElementById('toast-action');
            const toastMessage = toast.querySelector('.toast-msg');

            toastMessage.replaceChildren(formatToastMessage(message));
            actionButton.onclick = null;

            if (centered) {
                toast.classList.remove('bottom-4');
                toast.classList.add('top-1/2', '-translate-y-1/2');
            } else {
                toast.classList.remove('top-1/2', '-translate-y-1/2');
                toast.classList.add('bottom-4');
            }

            if (actionLabel && typeof onAction === 'function') {
                actionButton.textContent = actionLabel;
                actionButton.classList.remove('hidden');
                toast.classList.remove('pointer-events-none');
                toast.classList.add('pointer-events-auto');
                actionButton.onclick = () => {
                    onAction();
                };
            } else {
                actionButton.classList.add('hidden');
                toast.classList.remove('pointer-events-auto');
                toast.classList.add('pointer-events-none');
            }

            toast.classList.remove('scale-95', 'opacity-0');
            toast.classList.add('scale-100', 'opacity-100');

            if (window.toastTimeout) clearTimeout(window.toastTimeout);

            if (autoHide) {
                window.toastTimeout = setTimeout(() => {
                    hideToast();
                }, duration);
            }
        }

        // Wordle logic
        const TARGET_WORD = "PIZZA".toUpperCase();
        const WORD_LENGTH = 5;
        const MAX_GUESSES = 6;

        let guesses = Array.from({ length: MAX_GUESSES }, () => "");
        let currentRow = 0;
        let gameOver = false;
        
        const KEYBOARD_ROWS = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['ENTER', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', 'BACKSPACE']
        ];

        const keyColors = {};
        const STORAGE_KEY = 'wordle-state';
        let keyboardListenerAdded = false;
        let uiInitialized = false;
        function handlePhysicalKeyboard(e) {
            if (gameOver) return;
            const key = e.key.toUpperCase();
            if (key === 'ENTER' || key === 'BACKSPACE') {
                handleInput(key);
            } else if (/^[A-Z]$/.test(key)) {
                handleInput(key);
            }
        }
        // DOM Elements
        const boardEl = document.getElementById('board');
        const keyboardEl = document.getElementById('keyboard');
        const toastContainer = document.getElementById('toast-container');

        function saveGameState() {
            const state = {
                guesses,
                currentRow,
                gameOver,
                keyColors,
            };
            try {
                localStorage.setItem('wordle-state', JSON.stringify(state));
            } catch (error) {
                console.warn('Unable to save Wordle state', error);
            }
        }

        function loadGameState() {
            try {
                const raw = localStorage.getItem('wordle-state');
                if (!raw) return null;
                const state = JSON.parse(raw);
                if (!state || !Array.isArray(state.guesses) || typeof state.currentRow !== 'number') {
                    return null;
                }
                return state;
            } catch (error) {
                console.warn('Unable to load Wordle state', error);
                return null;
            }
        }

        function clearGameState() {
            localStorage.removeItem('wordle-state');
        }

        function initGame() {
            if (!uiInitialized) {
                setupGameUI();
            }

            guesses = Array.from({ length: MAX_GUESSES }, () => "");
            currentRow = 0;
            gameOver = false;
            Object.keys(keyColors).forEach(key => delete keyColors[key]);

            resetBoardUI();
            resetKeyboardUI();

            // Check for previously saved game state
            const savedState = loadGameState();
            if (savedState) {
                guesses = savedState.guesses.slice(0, MAX_GUESSES).map(guess => String(guess).toUpperCase().slice(0, WORD_LENGTH));
                currentRow = Math.min(Math.max(0, savedState.currentRow), MAX_GUESSES - 1);
                gameOver = Boolean(savedState.gameOver);
                Object.assign(keyColors, savedState.keyColors || {});
            }

            applySavedState();
        }

        function resetBoardUI() {
            for (let r = 0; r < MAX_GUESSES; r++) {
                for (let c = 0; c < WORD_LENGTH; c++) {
                    const tile = document.getElementById(`tile-${r}-${c}`);
                    if (!tile) continue;
                    tile.textContent = '';
                    tile.className = 'w-12 h-12 sm:w-16 sm:h-16 border-2 border-gray-300 flex items-center justify-center text-3xl font-franklin uppercase transition-colors duration-500';
                }
            }
        }

        function resetKeyboardUI() {
            KEYBOARD_ROWS.flat().forEach(key => {
                const btn = document.getElementById(`key-${key}`);
                if (!btn) return;
                btn.className = `font-franklin rounded ${key === 'ENTER' || key === 'BACKSPACE' ? 'px-2 sm:px-4 text-xs sm:text-sm' : 'px-2 sm:px-4 text-sm sm:text-base'} py-4 bg-gray-200 hover:bg-gray-300 transition-colors uppercase flex-1 max-w-[60px] flex items-center justify-center`;
            });
        }

        function setupGameUI() {
            boardEl.innerHTML = '';
            keyboardEl.innerHTML = '';

            // Generate Board once
            for (let r = 0; r < MAX_GUESSES; r++) {
                const rowEl = document.createElement('div');
                rowEl.className = 'grid grid-cols-5 gap-1.5';
                rowEl.id = `row-${r}`;
                
                for (let c = 0; c < WORD_LENGTH; c++) {
                    const tileEl = document.createElement('div');
                    tileEl.className = 'w-12 h-12 sm:w-16 sm:h-16 border-2 border-gray-300 flex items-center justify-center text-3xl font-franklin uppercase transition-colors duration-500';
                    tileEl.id = `tile-${r}-${c}`;
                    rowEl.appendChild(tileEl);
                }
                boardEl.appendChild(rowEl);
            }

            // Generate Keyboard once
            KEYBOARD_ROWS.forEach(row => {
                const rowEl = document.createElement('div');
                rowEl.className = 'flex justify-center gap-1.5';
                
                row.forEach(key => {
                    const btnEl = document.createElement('button');
                    btnEl.textContent = key === 'BACKSPACE' ? '⌫' : key;
                    btnEl.id = `key-${key}`;
                    btnEl.className = `font-franklin rounded ${key === 'ENTER' || key === 'BACKSPACE' ? 'px-2 sm:px-4 text-xs sm:text-sm' : 'px-2 sm:px-4 text-sm sm:text-base'} py-4 bg-gray-200 hover:bg-gray-300 transition-colors uppercase flex-1 max-w-[60px] flex items-center justify-center`;
                    
                    btnEl.addEventListener('click', () => handleInput(key));
                    rowEl.appendChild(btnEl);
                });
                keyboardEl.appendChild(rowEl);
            });

            if (!keyboardListenerAdded) {
                document.addEventListener('keydown', handlePhysicalKeyboard);
                keyboardListenerAdded = true;
            }

            uiInitialized = true;
        }

        function applySavedState() {
            for (let row = 0; row < MAX_GUESSES; row++) {
                const guess = guesses[row] || '';
                if (!guess) continue;

                const isEvaluatedRow = guess.length === WORD_LENGTH && (row < currentRow || (gameOver && row === currentRow));

                for (let c = 0; c < guess.length; c++) {
                    const tile = document.getElementById(`tile-${row}-${c}`);
                    if (!tile) continue;
                    tile.textContent = guess[c];
                    if (isEvaluatedRow) {
                        tile.classList.remove('border-gray-300', 'border-gray-500', 'text-black');
                        tile.classList.add('text-white');
                    } else {
                        tile.classList.remove('border-gray-300');
                        tile.classList.add('border-gray-500', 'text-black');
                    }
                }

                if (isEvaluatedRow) {
                    const evaluation = evaluateGuess(guess, TARGET_WORD);
                    for (let c = 0; c < WORD_LENGTH; c++) {
                        const tile = document.getElementById(`tile-${row}-${c}`);
                        if (!tile) continue;
                        const color = evaluation[c];
                        tile.classList.remove('border-gray-500', 'border-gray-300', 'bg-white');
                        if (color === 'green') tile.classList.add('bg-green-500', 'border-green-500');
                        else if (color === 'yellow') tile.classList.add('bg-yellow-500', 'border-yellow-500');
                        else tile.classList.add('bg-gray-500', 'border-gray-500');
                        updateKeyboardColor(guess[c], color);
                    }
                }
            }

            if (currentRow < MAX_GUESSES) {
                updateBoard();
            }

            Object.entries(keyColors).forEach(([letter, status]) => updateKeyboardColor(letter, status));
        }

        function handleInput(key) {
            if (gameOver) return;

            const currentGuess = guesses[currentRow];

            if (key === 'BACKSPACE') {
                guesses[currentRow] = currentGuess.slice(0, -1);
                updateBoard();
                saveGameState();
                return;
            }

            if (key === 'ENTER') {
                submitGuess();
                return;
            }

            if (currentGuess.length < WORD_LENGTH) {
                guesses[currentRow] += key;
                updateBoard();
                saveGameState();
                
                // Add pop animation to the newly added tile
                const tile = document.getElementById(`tile-${currentRow}-${currentGuess.length}`);
                tile.classList.remove('animate-pop');
                void tile.offsetWidth; // trigger reflow
                tile.classList.add('animate-pop');
            }
        }

        function updateBoard() {
            const currentGuess = guesses[currentRow];
            for (let c = 0; c < WORD_LENGTH; c++) {
                const tile = document.getElementById(`tile-${currentRow}-${c}`);
                const letter = currentGuess[c] || "";
                tile.textContent = letter;
                
                // Update border if filled
                if (letter) {
                    tile.classList.remove('border-gray-300');
                    tile.classList.add('border-gray-500', 'text-black');
                } else {
                    tile.classList.add('border-gray-300');
                    tile.classList.remove('border-gray-500', 'text-black');
                }
            }
        }

        function submitGuess() {
            const guess = guesses[currentRow];
            
            if (guess.length !== WORD_LENGTH) {
                showToastWordle("Not enough letters");
                shakeRow(currentRow);
                return;
            }
            const evaluation = evaluateGuess(guess, TARGET_WORD);
            revealTiles(evaluation, guess);
            saveGameState();
        }

        function evaluateGuess(guess, target) {
            const result = Array(WORD_LENGTH).fill('gray');
            const targetChars = target.split('');
            const guessChars = guess.split('');

            // First pass: Find greens (correct letter, correct spot)
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (guessChars[i] === targetChars[i]) {
                    result[i] = 'green';
                    targetChars[i] = null; // Mark as used
                    guessChars[i] = null;  // Mark as used
                }
            }

            // Second pass: Find yellows (correct letter, wrong spot)
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (guessChars[i] !== null) {
                    const index = targetChars.indexOf(guessChars[i]);
                    if (index !== -1) {
                        result[i] = 'yellow';
                        targetChars[index] = null; // Mark as used
                    }
                }
            }
            return result;
        }

        function revealTiles(evaluation, guess) {
            let delay = 0;
            
            for (let i = 0; i < WORD_LENGTH; i++) {
                const tile = document.getElementById(`tile-${currentRow}-${i}`);
                const color = evaluation[i];
                const letter = guess[i];
                
                setTimeout(() => {
                    tile.classList.add('animate-flip');
                    
                    setTimeout(() => {
                        // Remove base borders/colors
                        tile.classList.remove('border-gray-500', 'border-gray-300', 'text-black', 'bg-white');
                        
                        // Add evaluation colors
                        tile.classList.add('text-white');
                        if (color === 'green') tile.classList.add('bg-green-500', 'border-green-500');
                        else if (color === 'yellow') tile.classList.add('bg-yellow-500', 'border-yellow-500');
                        else tile.classList.add('bg-gray-500', 'border-gray-500');

                        updateKeyboardColor(letter, color);
                    }, 250); // Change color halfway through flip
                    
                }, delay);
                
                delay += 300; // stagger animation
            }

            setTimeout(() => checkWinCondition(guess), delay);
        }

        function updateKeyboardColor(letter, status) {
            const btn = document.getElementById(`key-${letter}`);
            if (!btn) return;

            // Priority: Green > Yellow > Gray
            const currentStatus = keyColors[letter];
            if (currentStatus === 'green') return; 
            if (currentStatus === 'yellow' && status === 'gray') return;

            keyColors[letter] = status;
            
            // Remove old classes
            btn.classList.remove('bg-gray-200', 'hover:bg-gray-300', 'bg-yellow-500', 'bg-gray-500', 'text-white');
            
            // Apply new classes
            if (status === 'green') {
                btn.classList.add('bg-green-500', 'text-white');
            } else if (status === 'yellow') {
                btn.classList.add('bg-yellow-500', 'text-white');
            } else {
                btn.classList.add('bg-gray-500', 'text-white');
            }
        }

        function checkWinCondition(guess) {
            if (guess === TARGET_WORD) {
                gameOver = true;
                enableUnlockBtn();
                setTimeout(() => showToastWordle("Fantastic!", 2500), 100);
                setTimeout(() => showToastWordle("Baby Dance, Woohoo", 2500), 2900);
            } else if (currentRow === MAX_GUESSES - 1) {
                gameOver = true;
                enableUnlockBtn();
                setTimeout(() => showToastWordle(TARGET_WORD, -1), 100); // show target word forever
            } else {
                currentRow++;
            }
            saveGameState();
        }

        function showToastWordle(message, duration = 2000) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.className = 'bg-black text-white text-sm text-center px-4 py-3 rounded font-bold shadow-lg toast-enter';
            
            toastContainer.appendChild(toast);
            
            // Trigger animation
            requestAnimationFrame(() => {
                toast.classList.add('toast-enter-active');
            });

            if (duration > 0) {
                setTimeout(() => {
                    toast.classList.remove('toast-enter-active');
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            }
        }

        function shakeRow(row) {
            const rowEl = document.getElementById(`row-${row}`);
            rowEl.animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-5px)' },
                { transform: 'translateX(5px)' },
                { transform: 'translateX(-5px)' },
                { transform: 'translateX(5px)' },
                { transform: 'translateX(0)' }
            ], { duration: 400 });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const progress = parseInt(localStorage.getItem('mrt_progress') || '1');
            if (progress > 1) {
                // Show solved wordle
                const correctBtn = document.getElementById('correct-opt');
                correctBtn.classList.add('border-emerald-500/80', 'bg-emerald-950/20', 'text-emerald-400');
                correctBtn.querySelector('i').className = 'fa-solid fa-circle-check text-emerald-500';
                isCorrectAnswered = true;
                
                document.querySelectorAll('.option-btn').forEach(b => {
                    if (b !== correctBtn) {
                        b.classList.add('pointer-events-none', 'opacity-40');
                    }
                });
                enableUnlockBtn()
            }

            if (localStorage.getItem('macpherson_welcome_acknowledged') !== 'true') {
                showToast(
                    '<b>Congratulations on completing the first station, <em>CC10 MacPherson!</em></b><br><br>Now, you will have to solve a familiar puzzle in order to figure out what we are doing at the next station!',
                    {
                        centered: true,
                        actionLabel: 'Continue',
                        autoHide: false,
                        onAction: () => {
                            localStorage.setItem('macpherson_welcome_acknowledged', 'true');
                            hideToast();
                            initGame();
                            document.getElementById('wordle').classList.remove('hidden');
                        }
                    }
                );
            } else {
                initGame();
                document.getElementById('wordle').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
