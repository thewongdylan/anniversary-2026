<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paya Lebar Station - CC9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="assets/shared.css" rel="stylesheet">
    <style>
        /* Toast fade */
        .toast-enter { opacity: 0; transform: translateY(-20px); transition: all 0.3s; }
        .toast-enter-active { opacity: 1; transform: translateY(0); }
        
        /* Crossword specific styling */
        .cw-cell {
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            outline: none;
            transition: all 0.2s ease;
        }
        .cw-cell:focus {
            background-color: #fef08a; /* yellow-200 */
            border-color: #ca8a04; /* yellow-600 */
            transform: scale(1.05);
            z-index: 10;
        }
        /* Highlight for the vertical hidden word */
        .cw-highlight {
            background-color: #ffedd5; /* orange-100 */
            border-color: #f97316; /* orange-500 */
            color: #c2410c; /* orange-800 */
        }
        
        /* Hide scrollbar for a cleaner look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="overflow-hidden bg-slate-50 text-black font-sans antialiased">
    <div id="toast" class="fixed inset-x-4 bottom-4 z-[100] max-w-[22rem] mx-auto bg-[#063e4d] text-slate-100 border border-orange-500/30 rounded-2xl shadow-2xl shadow-slate-950/30 px-4 py-3 flex items-start gap-3 scale-95 opacity-0 pointer-events-none transition-all duration-300">
        <div class="mt-0.5 text-orange-400 flex-shrink-0">
            <i class="fa-solid fa-circle-info"></i>
        </div>
        <div class="min-w-0 flex-1">
            <div class="toast-msg text-[12px] leading-relaxed text-slate-100"></div>
            <button id="toast-action" type="button" class="hidden mt-3 px-3 py-1.5 rounded-lg bg-orange-500 hover:bg-orange-400 text-slate-950 text-[11px] font-bold transition-colors duration-200"></button>
        </div>
    </div>

    <div class="app-shell h-screen max-w-md mx-auto bg-white flex flex-col justify-between shadow-2xl border-x border-slate-200/60 relative overflow-hidden">
        
        <header class="bg-[#063e4d] border-b border-slate-200/20 p-4 sticky top-0 z-50 flex items-center justify-between shadow-md">
            <button onclick="goBack()" class="text-sm font-semibold text-slate-400 hover:text-white transition-all flex items-center gap-1">
                <i class="fa-solid fa-chevron-left"></i> Map
            </button>
            <div class="flex items-center space-x-1.5">
                <span class="font-lta bg-[#FA890F] text-white text-[10px] px-1.5 py-0.5 rounded font-black tracking-wide">CC9</span>
                <span class="font-lta bg-[#009645] text-white text-[10px] px-1.5 py-0.5 rounded font-black tracking-wide">EW8</span>
                <span class="font-lta text-xs font-bold text-slate-200">Paya Lebar</span>
            </div>
            <div class="w-10"></div> </header>

        <div id='crossword-container' class="hidden flex-1 overflow-y-auto no-scrollbar flex flex-col relative bg-slate-50 pb-2">

            <header class="flex flex-col items-center justify-center p-4 bg-white border-b border-slate-200 shadow-sm z-10 sticky top-0">
                <h1 class="text-3xl font-karnak font-black tracking-wider text-slate-800">CROSSWORD</h1>
                <p class="text-xs text-slate-500 font-medium mt-1">Solve to reveal the hidden word!</p>
            </header>

            <main class="w-full flex justify-center mt-6 px-2 overflow-x-auto no-scrollbar">
                <div id="board" class="flex flex-col gap-1 pb-4 min-w-max">
                    </div>
            </main>

            <div class="mt-2 px-5 pb-6 h-20 flex flex-col justify-center relative">
                <div id="hint-box" class="absolute inset-x-5 bg-white border-2 border-orange-200 shadow-md rounded-xl p-4 transition-all duration-300 opacity-0 transform translate-y-2 pointer-events-none z-10">
                    <p id="active-hint-text" class="text-sm text-slate-800 font-medium leading-relaxed text-center"></p>
                </div>
                
                <p id="default-hint-msg" class="text-xs text-slate-400 text-center transition-all duration-300 absolute inset-x-0">
                    Tap on any tile to reveal its clue
                </p>
            </div>

        </div>

        <footer class="bg-white border-t border-slate-200/60 p-5 flex flex-col space-y-3 shrink-0 relative z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
            <button id="unlock-btn" disabled onclick="unlockNext()" class="w-full py-3.5 px-4 rounded-xl font-bold text-xs bg-slate-800 border border-slate-700 text-slate-500 cursor-not-allowed transition-all flex items-center justify-center gap-2 shadow-lg shadow-slate-900/10">
                <i class="fa-solid fa-lock text-[10px]"></i> Solve to unlock next station
            </button>
        </footer>

    </div>

    <script>
        // Utility functions
        function goBack() {
            window.location.href = 'index.html'; 
        }

        function enableUnlockBtn() {
            const unlockBtn = document.getElementById('unlock-btn');
            unlockBtn.removeAttribute('disabled');
            unlockBtn.className = 'w-full py-3.5 px-4 rounded-xl font-extrabold text-xs bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-slate-950 transition-all flex items-center justify-center gap-2 shadow-lg shadow-orange-500/20 active:scale-[0.98] cursor-pointer';
            unlockBtn.innerHTML = '<i class="fa-solid fa-train"></i> Continue on your journey!';
        }

        function unlockNext() {
            const currentProgress = parseInt(localStorage.getItem('mrt_progress') || '0');
            if (currentProgress === 0) {
                localStorage.setItem('mrt_progress', '1');
            }
            goBack();
        }

        function hideToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('top-1/2', '-translate-y-1/2', 'scale-100', 'opacity-100', 'pointer-events-auto');
            toast.classList.add('bottom-4', 'scale-95', 'opacity-0', 'pointer-events-none');
        }

        function showToast(message, options = {}) {
            const { actionLabel = null, onAction = null, autoHide = true, duration = 2500, centered = false } = options;
            const toast = document.getElementById('toast');
            const actionButton = document.getElementById('toast-action');
            const toastMessage = toast.querySelector('.toast-msg');

            toastMessage.innerHTML = message; 
            actionButton.onclick = null;

            if (centered) {
                toast.classList.remove('bottom-4');
                toast.classList.add('top-1/2', '-translate-y-1/2');
            } else {
                toast.classList.remove('top-1/2', '-translate-y-1/2');
                toast.classList.add('bottom-4');
            }

            if (actionLabel && typeof onAction === 'function') {
                actionButton.textContent = actionLabel;
                actionButton.classList.remove('hidden');
                toast.classList.remove('pointer-events-none');
                toast.classList.add('pointer-events-auto');
                actionButton.onclick = () => {
                    onAction();
                };
            } else {
                actionButton.classList.add('hidden');
                toast.classList.remove('pointer-events-auto');
                toast.classList.add('pointer-events-none');
            }

            toast.classList.remove('scale-95', 'opacity-0');
            toast.classList.add('scale-100', 'opacity-100');

            if (window.toastTimeout) clearTimeout(window.toastTimeout);

            if (autoHide) {
                window.toastTimeout = setTimeout(() => {
                    hideToast();
                }, duration);
            }
        }

        // --- Crossword Logic ---
        const CROSSWORD_DATA = [
            { word: "UNOPARTY",   offset: 2, hint: "Chaotic card game (fun for 6-14 players)" },
            { word: "LESHRIMP",      offset: 2, hint: "Where we ate for our first date" },
            { word: "MONTIGO",    offset: 4, hint: "Our favourite resort destination" },
            { word: "XOKITTY",  offset: 1, hint: "Romance series we binge watched" },
            { word: "NITORI",      offset: 2, hint: "Store that sells super cooling pillows" },
            { word: "BALATRO",    offset: 5, hint: "Chaotic card game (jokers galore)" },
            { word: "HOC",      offset: 4, hint: "Underwood's TV series, for short" },
            { word: "HOAGIES",  offset: 4, hint: "Our Buddy who makes excellent Rosti"},
            { word: "MATILDA",   offset: 3, hint: "Our dance instructor's name" },
            { word: "CROCHET",  offset: 1, hint: "The craft we engage in most often" }
        ];

        const TARGET_COL = 5; 
        const STORAGE_KEY = 'paya-lebar-crossword-state';
        
        let boardState = Array(CROSSWORD_DATA.length).fill(""); 
        let isSolved = false;

        function saveGameState() {
            const state = { boardState, isSolved };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadGameState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return false;
                const state = JSON.parse(raw);
                if (state && Array.isArray(state.boardState)) {
                    boardState = state.boardState;
                    isSolved = state.isSolved;
                    return true;
                }
            } catch (e) {
                console.warn('Could not load game state');
            }
            return false;
        }

        // --- Hint Visibility Logic ---
        function showActiveHint(r) {
            if (isSolved) return; 
            const hintBox = document.getElementById('hint-box');
            const hintText = document.getElementById('active-hint-text');
            const defaultMsg = document.getElementById('default-hint-msg');

            hintText.innerHTML = `<span class="text-orange-500 font-black mr-2">${r + 1}.</span> ${CROSSWORD_DATA[r].hint}`;
            
            hintBox.classList.remove('opacity-0', 'translate-y-2');
            hintBox.classList.add('opacity-100', 'translate-y-0');
            
            defaultMsg.classList.add('opacity-0');
        }

        function hideActiveHint() {
            const hintBox = document.getElementById('hint-box');
            const defaultMsg = document.getElementById('default-hint-msg');

            hintBox.classList.remove('opacity-100', 'translate-y-0');
            hintBox.classList.add('opacity-0', 'translate-y-2');

            if (!isSolved) {
                defaultMsg.classList.remove('opacity-0');
            }
        }

        function setupCrosswordUI() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            // Generate Grid
            CROSSWORD_DATA.forEach((rowObj, r) => {
                if (!boardState[r]) {
                    boardState[r] = Array(rowObj.word.length).fill("");
                }

                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex gap-0 items-center';

                // Add row number label
                const label = document.createElement('div');
                label.className = 'w-5 text-[10px] font-bold text-slate-400 text-right mr-1 select-none';
                label.textContent = r + 1;
                rowDiv.appendChild(label);

                // Add invisible spacer blocks
                for (let i = 0; i < rowObj.offset; i++) {
                    const spacer = document.createElement('div');
                    spacer.className = 'w-7 h-7 sm:w-8 sm:h-8';
                    rowDiv.appendChild(spacer);
                }

                // Add input cells for the word
                for (let c = 0; c < rowObj.word.length; c++) {
                    const isTargetCol = (rowObj.offset + c) === TARGET_COL;
                    
                    const cell = document.createElement('input');
                    cell.type = 'text';
                    cell.maxLength = 1;
                    cell.id = `cell-${r}-${c}`;
                    
                    let cellClass = 'cw-cell w-7 h-7 sm:w-8 sm:h-8 border-2 rounded text-sm sm:text-base bg-white shadow-sm ';
                    
                    if (isTargetCol) {
                        cellClass += 'cw-highlight ';
                    } else {
                        cellClass += 'border-slate-300 text-slate-800 focus:border-slate-500 ';
                    }

                    cell.className = cellClass;
                    cell.value = boardState[r][c] || "";
                    
                    if (isSolved) cell.disabled = true;

                    // Event Listeners for typing and navigation
                    cell.addEventListener('input', (e) => handleInput(r, c, e));
                    cell.addEventListener('keydown', (e) => handleKeyDown(r, c, e));
                    
                    // Focus logic for dynamic hints
                    cell.addEventListener('focus', () => showActiveHint(r));
                    cell.addEventListener('blur', () => {
                        // Small delay to check if focus just shifted to another crossword cell
                        setTimeout(() => {
                            if (!document.activeElement.classList.contains('cw-cell')) {
                                hideActiveHint();
                            }
                        }, 50);
                    });

                    rowDiv.appendChild(cell);
                }
                
                boardEl.appendChild(rowDiv);
            });
        }

        function handleInput(r, c, e) {
            let val = e.target.value.toUpperCase();
            if (val && !/^[A-Z]$/.test(val)) {
                e.target.value = '';
                return;
            }
            
            e.target.value = val;
            boardState[r][c] = val;
            saveGameState();

            if (val && c < CROSSWORD_DATA[r].word.length - 1) {
                const nextCell = document.getElementById(`cell-${r}-${c + 1}`);
                if (nextCell) nextCell.focus();
            }

            checkWin();
        }

        function handleKeyDown(r, c, e) {
            if (e.key === 'Backspace' && e.target.value === '') {
                e.preventDefault();
                if (c > 0) {
                    const prevCell = document.getElementById(`cell-${r}-${c - 1}`);
                    if (prevCell) {
                        prevCell.focus();
                        prevCell.value = '';
                        boardState[r][c - 1] = '';
                        saveGameState();
                    }
                }
            }
            else if (e.key === 'ArrowLeft' && c > 0) {
                document.getElementById(`cell-${r}-${c - 1}`).focus();
            }
            else if (e.key === 'ArrowRight' && c < CROSSWORD_DATA[r].word.length - 1) {
                document.getElementById(`cell-${r}-${c + 1}`).focus();
            }
            else if (e.key === 'ArrowDown' && r < CROSSWORD_DATA.length - 1) {
                const nextRowOffset = CROSSWORD_DATA[r+1].offset;
                const currentCol = CROSSWORD_DATA[r].offset + c;
                const targetC = currentCol - nextRowOffset;
                
                if (targetC >= 0 && targetC < CROSSWORD_DATA[r+1].word.length) {
                    document.getElementById(`cell-${r+1}-${targetC}`).focus();
                } else {
                    document.getElementById(`cell-${r+1}-0`).focus(); 
                }
            }
            else if (e.key === 'ArrowUp' && r > 0) {
                const prevRowOffset = CROSSWORD_DATA[r-1].offset;
                const currentCol = CROSSWORD_DATA[r].offset + c;
                const targetC = currentCol - prevRowOffset;
                
                if (targetC >= 0 && targetC < CROSSWORD_DATA[r-1].word.length) {
                    document.getElementById(`cell-${r-1}-${targetC}`).focus();
                } else {
                    document.getElementById(`cell-${r-1}-0`).focus();
                }
            }
        }

        function checkWin() {
            if (isSolved) return;

            let win = true;
            for (let r = 0; r < CROSSWORD_DATA.length; r++) {
                const targetWord = CROSSWORD_DATA[r].word;
                const currentWord = boardState[r].join('');
                if (currentWord !== targetWord) {
                    win = false;
                    break;
                }
            }

            if (win) {
                isSolved = true;
                saveGameState();
                
                // Hide dynamic hint permanently and show completion text
                hideActiveHint();
                document.getElementById('default-hint-msg').innerHTML = '<i class="fa-solid fa-star text-orange-500 mr-1"></i> Puzzle Solved! <i class="fa-solid fa-star text-orange-500 ml-1"></i>';
                document.getElementById('default-hint-msg').classList.remove('opacity-0');
                
                document.querySelectorAll('.cw-cell').forEach(cell => {
                    cell.disabled = true;
                    if (!cell.classList.contains('cw-highlight')) {
                        cell.classList.replace('bg-white', 'bg-slate-100');
                        cell.classList.replace('text-slate-800', 'text-slate-400');
                        cell.classList.replace('border-slate-300', 'border-slate-200');
                    } else {
                        cell.classList.replace('bg-[#ffedd5]', 'bg-orange-500');
                        cell.classList.replace('border-[#f97316]', 'border-orange-600');
                        cell.classList.replace('text-[#c2410c]', 'text-white');
                        cell.style.transform = 'scale(1.1)';
                        setTimeout(() => { cell.style.transform = 'scale(1)'; }, 300);
                    }
                });

                enableUnlockBtn();
            }
        }

        function initGame() {
            loadGameState();
            setupCrosswordUI();

            if (isSolved) {
                checkWin(); 
                enableUnlockBtn();
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const progress = parseInt(localStorage.getItem('mrt_progress') || '0');
            if (progress > 1) {
                isSolved = true; 
                CROSSWORD_DATA.forEach((row, r) => {
                    boardState[r] = row.word.split('');
                });
                enableUnlockBtn()
            }

            if (localStorage.getItem('paya_lebar_welcome_acknowledged') !== 'true') {
                showToast(
                    '<b>Welcome to your first puzzle of the day!</b><br><br>Solve the crossword horizontally to reveal the first activity we will be embarking on!',
                    {
                        centered: true,
                        actionLabel: 'Continue',
                        autoHide: false,
                        onAction: () => {
                            localStorage.setItem('paya_lebar_welcome_acknowledged', 'true');
                            hideToast();
                            initGame();
                            document.getElementById('crossword-container').classList.remove('hidden');
                        }
                    }
                );
            } else {
                initGame();
                document.getElementById('crossword-container').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
